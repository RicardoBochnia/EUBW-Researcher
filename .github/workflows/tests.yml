name: PR Tests

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "README.md"
      - "configs/**"
      - "pyproject.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "tests_closeout/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_unit: ${{ steps.detect.outputs.run_unit }}
      run_integration: ${{ steps.detect.outputs.run_integration }}
      run_closeout: ${{ steps.detect.outputs.run_closeout }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect impacted test suites
        id: detect
        shell: bash
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "Changed files:"
          printf '%s\n' "$changed_files"

          run_integration=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(configs/|scripts/(answer_question\.py|build_real_corpus_catalog\.py|refresh_real_corpus\.py|report_validated_current_state\.py|run_eval\.py|run_integration_tests\.py|run_real_question_pack\.py|run_tests\.py)|src/eubw_researcher/(config\.py|corpus/|evaluation/|pipeline\.py|runtime_facade\.py)|tests/integration/)'; then
            run_integration=true
          fi

          run_closeout=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(scripts/(report_validated_current_state\.py|run_closeout_tests\.py|run_scenario_d_closeout\.py|run_spawned_validator_gate\.py|run_tests\.py)|src/eubw_researcher/(corpus/reporting\.py|evaluation/)|tests/unit/(test_evaluation_closeout\.py|test_validated_current_state\.py)|tests_closeout/)'; then
            run_closeout=true
          fi

          echo "run_unit=true" >> "$GITHUB_OUTPUT"
          echo "run_integration=$run_integration" >> "$GITHUB_OUTPUT"
          echo "run_closeout=$run_closeout" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_unit == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit test suite
        run: python3 scripts/run_unit_tests.py

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_integration == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run integration test suite
        run: python3 scripts/run_integration_tests.py

  closeout-tests:
    name: Closeout tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_closeout == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run closeout test suite
        run: python3 scripts/run_closeout_tests.py
