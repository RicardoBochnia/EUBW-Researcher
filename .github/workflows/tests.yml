name: PR Tests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.detect.outputs.run_ci }}
      run_integration: ${{ steps.detect.outputs.run_integration }}
      run_closeout: ${{ steps.detect.outputs.run_closeout }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect impacted test suites
        id: detect
        run: |
          python3 scripts/route_pr_test_suites.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --github-output "$GITHUB_OUTPUT"

  no-runtime-changes:
    name: No runtime test suites required
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_ci != 'true'
    steps:
      - name: Explain why test jobs were skipped
        run: echo "No runtime-relevant files changed; skipping test suites."

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_ci == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit test suite
        run: python3 scripts/run_unit_tests.py

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - unit-tests
    if: needs.detect-changes.outputs.run_integration == 'true' && needs.unit-tests.result == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run integration test suite
        run: python3 scripts/run_integration_tests.py

  closeout-tests:
    name: Closeout tests
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - unit-tests
    if: needs.detect-changes.outputs.run_closeout == 'true' && needs.unit-tests.result == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run closeout test suite
        run: python3 scripts/run_closeout_tests.py
